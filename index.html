<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Spin Miner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#050510;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:Arial,sans-serif;
  user-select:none;
}
#hdr {
  color:#7af; font-size:20px; font-weight:bold;
  letter-spacing:4px; margin-bottom:6px;
  text-shadow:0 0 12px #4af;
}
#hint {
  color:#667; font-size:12px; margin-bottom:6px;
}
canvas { cursor:crosshair; display:block; }
</style>
</head>
<body>
<div id="hdr">⛏ SPIN MINER</div>
<div id="hint">WASD/클릭/드래그로 이동 · 떨어진 광석을 주워 카고를 채우세요 · 광석은 BASE에서 비우세요</div>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = c.width  = 820;
const H = c.height = 590;

/* ───── Particles ───── */
const pts = [];
const ores = [];
function spawnPts(x, y, col, n) {
  n = n||5;
  for (let i=0;i<n;i++){
    const a=Math.random()*6.28, s=1+Math.random()*3;
    pts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:1,dk:.035+Math.random()*.04,sz:2+Math.random()*3});
  }
}
function tickPts(){
  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life-=p.dk;
    if(p.life<=0)pts.splice(i,1);
  }
}
function drawPts(){
  for(const p of pts){
    ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,6.28);
    ctx.fillStyle=p.col;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function spawnOre(x,y,val,col,tier){
  const chunkCaps={small:6,mid:10,large:18,giant:28};
  const chunkBase={small:4,mid:7,large:14,giant:22};
  const cap=chunkCaps[tier]||10;
  const base=chunkBase[tier]||6;
  const chunks=Math.max(3,Math.min(cap,base+Math.ceil(val/10)));
  let left=val;
  for(let i=0;i<chunks;i++){
    const amount=i===chunks-1?left:Math.max(1,Math.floor(val/chunks));
    left-=amount;
    const a=Math.random()*6.28;
    const dist=18+Math.random()*34;
    ores.push({
      x:x+Math.cos(a)*dist,
      y:y+Math.sin(a)*dist,
      vx:Math.cos(a)*(1.4+Math.random()*2.1),
      vy:Math.sin(a)*(1.4+Math.random()*2.1),
      val:amount,
      col:col||'#7bdcff',
      r:4+Math.random()*3,
      t:0,
    });
  }
}

function collectOre(val){
  const free=CARRY_MAX-playerCargo;
  if(free<=0) return 0;
  const gained=Math.min(free,val);
  playerCargo+=gained;
  score+=gained;
  return gained;
}

function tickOres(){
  for(let i=ores.length-1;i>=0;i--){
    const o=ores[i];
    o.t++;
    o.x+=o.vx;o.y+=o.vy;
    o.vx*=.9;o.vy*=.9;
    o.x=Math.max(o.r,Math.min(W-o.r,o.x));
    o.y=Math.max(o.r,Math.min(H-o.r,o.y));

    const dx=plr.x-o.x,dy=plr.y-o.y,d=Math.hypot(dx,dy);
    if(playerCargo<CARRY_MAX&&d>0.001&&d<ORE_MAGNET_RADIUS){
      const s=ORE_MAGNET_SPEED*(1-d/ORE_MAGNET_RADIUS+.25);
      o.x+=dx/d*s;
      o.y+=dy/d*s;
    }
    if(playerCargo<CARRY_MAX&&d<ORE_PICKUP_RADIUS){
      const gained=collectOre(o.val);
      if(gained>=o.val){
        spawnPts(plr.x,plr.y,o.col,3);
        ores.splice(i,1);
      } else if(gained>0){
        o.val-=gained;
      }
    }
  }
}

function drawOres(){
  for(const o of ores){
    ctx.save();
    ctx.shadowColor=o.col;ctx.shadowBlur=8;
    ctx.translate(o.x,o.y);
    ctx.rotate(o.t*.04);
    ctx.fillStyle=o.col;
    ctx.fillRect(-o.r,-o.r,o.r*2,o.r*2);
    ctx.strokeStyle='rgba(255,255,255,.45)';
    ctx.lineWidth=1;
    ctx.strokeRect(-o.r,-o.r,o.r*2,o.r*2);
    ctx.restore();
  }
}

/* ───── Screen Shake ───── */
let sx=0,sy=0,sm=0;
function shake(m){sm=Math.max(sm,m);}
function tickShake(){
  if(sm>.3){sx=(Math.random()-.5)*sm;sy=(Math.random()-.5)*sm;sm*=.75;}
  else{sx=sy=sm=0;}
}

/* ───── Polygon helper ───── */
function drawPoly(x,y,r,sides,a0,fill){
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=a0+i/sides*6.28;
    i?ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)
     :ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle=fill;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=2;ctx.stroke();
}

function strokePoly(x,y,r,sides,a0,stroke,width){
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=a0+i/sides*6.28;
    i?ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)
     :ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.strokeStyle=stroke;
  ctx.lineWidth=width;
  ctx.stroke();
}

function mineralNumber(hp){
  return Math.max(0, hp/10).toFixed(2) + 'A';
}

function mineralGap(a,b){
  return a.r+b.r+(a.type==='large'||b.type==='large'?42:30);
}

const WEAK_APPEAR_FRAMES = 120;
const WEAK_BREAK_GAIN = 1.25;
const WEAK_MOVE_FRAMES = 390;
const BREAK_TIME_FRAMES = 300;
const PICKAXE_DAMAGE = 9.2;
const BREAK_DAMAGE_MULTIPLIER = 1.8;
const WEAK_OFFSET_MIN = .42;
const WEAK_OFFSET_MAX = .78;
const ORE_PICKUP_RADIUS = 28;
const ORE_MAGNET_RADIUS = 86;
const ORE_MAGNET_SPEED = 4.2;

function findSpawnSpot(r,type,top,bottom){
  for(let tries=0;tries<260;tries++){
    const x=r+36+Math.random()*(W-(r+36)*2);
    const usableH=Math.max(30,bottom-top-r*2);
    const y=top+r+Math.random()*usableH;
    const probe={x,y,r,type};
    const clearMinerals=!minerals.some(m=>Math.hypot(m.x-x,m.y-y)<mineralGap(probe,m));
    const clearBase=Math.hypot(x-base.x,y-base.y)>r+base.r+105;
    const clearPlayer=Math.hypot(x-plr.x,y-plr.y)>r+plr.pOrbit+plr.pLen+72;
    if(clearMinerals&&clearBase&&clearPlayer) return {x,y};
  }
  return null;
}

function fallbackSpawnSpot(r,slot,total,top,bottom){
  const cols=Math.max(1,Math.ceil(Math.sqrt(total+2)));
  const col=slot%cols;
  const row=Math.floor(slot/cols);
  const rows=Math.max(1,Math.ceil(total/cols));
  const x=r+38+(W-(r+38)*2)*((col+.5)/cols);
  const y=top+r+(Math.max(30,bottom-top-r*2))*((row+.5)/rows);
  return {
    x:Math.max(r+30,Math.min(W-r-30,x)),
    y:Math.max(top+r,Math.min(bottom-r,y)),
  };
}

function clampMineral(m){
  m.x=Math.max(m.r+24,Math.min(W-m.r-24,m.x));
  m.y=Math.max(m.r+44,Math.min(H-170-m.r,m.y));
}

function relaxMineralLayout(){
  for(let step=0;step<90;step++){
    let moved=false;
    for(let i=0;i<minerals.length;i++){
      const a=minerals[i];
      if(a.mined) continue;
      for(let j=i+1;j<minerals.length;j++){
        const b=minerals[j];
        if(b.mined) continue;
        let dx=b.x-a.x, dy=b.y-a.y;
        let d=Math.hypot(dx,dy);
        const gap=mineralGap(a,b);
        if(d<=0.001){
          const angle=(i*2.399+j)*6.28;
          dx=Math.cos(angle);
          dy=Math.sin(angle);
          d=1;
        }
        if(d<gap){
          const push=(gap-d)*.52;
          const nx=dx/d, ny=dy/d;
          a.x-=nx*push; a.y-=ny*push;
          b.x+=nx*push; b.y+=ny*push;
          clampMineral(a); clampMineral(b);
          moved=true;
        }
      }

      const bd=Math.hypot(a.x-base.x,a.y-base.y);
      const baseGap=a.r+base.r+112;
      if(bd<baseGap){
        const nx=(a.x-base.x)/(bd||1);
        const ny=(a.y-base.y)/(bd||1);
        a.x+=nx*(baseGap-bd);
        a.y+=ny*(baseGap-bd);
        clampMineral(a);
        moved=true;
      }
    }
    if(!moved) break;
  }
}

function isBlockedByMineral(x,y){
  return minerals.some(m=>!m.mined&&Math.hypot(x-m.x,y-m.y)<plr.r+m.r+5);
}

/* ───── Mineral ───── */
class Mineral {
  constructor(o){
    this.type  = o.type||'normal';
    this.tier  = o.tier||this.type;
    this.x=o.x; this.y=o.y;
    this.r     = o.r||20;
    this.sides = o.sides||6;
    this.col   = o.col||'#7f7';
    this.hp    = o.hp||100; this.maxHp=this.hp;
    this.val   = o.val||10;
    this.mined = false;
    this.ang   = Math.random()*6.28;
    this.spin  = (Math.random()-.5)*.007;
    this.hitImpact = 0;
    if(this.type==='large'){
      this.crack  = 0;
      this.wAng   = Math.random()*6.28;
      this.wPulse = 0;
      this.wHitPulse = 0;
      this.wMoveTick = 0;
      this.wReveal = 0;
      this.wWasVisible = false;
      this.breakTime = 0;
      this.cLines = Array.from({length:9},()=>({a:Math.random()*6.28,len:.2+Math.random()*.65}));
    }
  }
  get wx(){ return this.x+Math.cos(this.wAng)*this.r*.86; }
  get wy(){ return this.y+Math.sin(this.wAng)*this.r*.86; }

  hit(isWeak, hitX, hitY){
    if(this.hitImpact<=0) this.hitImpact=10;
    if(this.type==='large'){
      const wasHidden=this.wReveal<=0;
      const weakVisible=this.wReveal>=WEAK_APPEAR_FRAMES&&this.breakTime<=0;
      if(isWeak&&weakVisible){
        this.wHitPulse=Math.min(1,this.wHitPulse+.75);
        const old=this.crack;
        this.crack=Math.min(100,this.crack+WEAK_BREAK_GAIN);
        if(this.crack>=100&&old<100){
          this.breakTime=BREAK_TIME_FRAMES;
          this.wReveal=0;
          this.wWasVisible=false;
          shake(10);spawnPts(this.x,this.y,'#ff0',25);
        }
        this.hp-=PICKAXE_DAMAGE;
        spawnPts(this.wx,this.wy,'#f80',4);
      } else {
        const dmg=this.breakTime>0?PICKAXE_DAMAGE*BREAK_DAMAGE_MULTIPLIER:PICKAXE_DAMAGE;
        this.hp-=dmg;
        if(this.breakTime<=0&&wasHidden&&hitX!==undefined&&hitY!==undefined){
          const side=Math.random()<.5?-1:1;
          const off=WEAK_OFFSET_MIN+Math.random()*(WEAK_OFFSET_MAX-WEAK_OFFSET_MIN);
          this.wAng=Math.atan2(hitY-this.y,hitX-this.x)+side*off;
          this.wMoveTick=0;
        }
        if(this.breakTime<=0&&!weakVisible){
          this.wReveal=Math.min(WEAK_APPEAR_FRAMES,this.wReveal+1);
        }
        if(this.breakTime>0) spawnPts(this.x+(Math.random()-.5)*this.r,this.y+(Math.random()-.5)*this.r,'#ff8',5);
        else spawnPts(this.x+(Math.random()-.5)*this.r,this.y+(Math.random()-.5)*this.r,'#ffe66d',2);
      }
    } else {
      this.hp-=PICKAXE_DAMAGE;
      spawnPts(this.x+(Math.random()-.5)*this.r,this.y+(Math.random()-.5)*this.r,'#ffe66d',3);
    }
    if(this.hp<=0){
      this.hp=0; this.mined=true;
      spawnPts(this.x,this.y,this.col,15); shake(5);
      return true;
    }
    return false;
  }

  update(){
    this.ang+=this.spin;
    if(this.hitImpact>0) this.hitImpact--;
    if(this.type==='large'){
      this.wPulse+=.05;
      this.wHitPulse*=.68;
      if(this.breakTime>0){
        this.breakTime--;
        if(this.breakTime<=0){
          this.breakTime=0;
          this.crack=0;
          this.wReveal=0;
          this.wWasVisible=false;
          this.wMoveTick=0;
          this.wAng=Math.random()*6.28;
          spawnPts(this.x,this.y,'#aaa',12);
        }
      }
      const wasVisible=this.wWasVisible;
      this.wWasVisible=this.wReveal>=WEAK_APPEAR_FRAMES&&this.breakTime<=0;
      if(this.wWasVisible&&!wasVisible){
        shake(3);
        spawnPts(this.wx,this.wy,'#f44',18);
      }
      if(this.wReveal>=WEAK_APPEAR_FRAMES||this.breakTime>0) this.wMoveTick++;
      if(this.wReveal>=WEAK_APPEAR_FRAMES&&this.breakTime<=0&&this.wMoveTick>WEAK_MOVE_FRAMES){
        this.wMoveTick=0;
        this.wAng=Math.random()*6.28;
        spawnPts(this.wx,this.wy,'#f44',10);
      }
    }
  }

  draw(){
    if(this.mined) return;
    const hr=this.hp/this.maxHp;
    const hitT=this.hitImpact>0?this.hitImpact/10:0;
    const pulseScale=1-Math.sin(hitT*3.14)*.04;
    const rr=this.r*pulseScale;

    if(this.type==='large'){
      /* body */
      if(this.breakTime>0){
        ctx.save();ctx.shadowColor='#ff8';ctx.shadowBlur=22;
        drawPoly(this.x,this.y,rr,this.sides,this.ang,this.col);
        ctx.restore();
      } else {
        drawPoly(this.x,this.y,rr,this.sides,this.ang,this.col);
      }

      /* crack lines */
      if(this.crack>0){
        ctx.save();
        ctx.globalAlpha=Math.min(.85,this.crack/100);
        ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
        for(const cl of this.cLines){
          ctx.beginPath();
          ctx.moveTo(this.x,this.y);
          ctx.lineTo(this.x+Math.cos(cl.a)*rr*cl.len,this.y+Math.sin(cl.a)*rr*cl.len);
          ctx.stroke();
        }
        ctx.restore();
      }

      /* damage overlay */
      if(hr<1){
        ctx.save();ctx.globalAlpha=(1-hr)*.55;
        drawPoly(this.x,this.y,rr,this.sides,this.ang,'#000');
        ctx.restore();
      }

      /* weak point */
      if(this.wReveal>=WEAK_APPEAR_FRAMES&&this.breakTime<=0){
        const grow=this.crack/100;
        const hitPop=this.wHitPulse;
        const wp=8+grow*15+hitPop*7+Math.sin(this.wPulse*3)*(2+grow*2);
        const wc=this.crack>=75?'#ff4':'#f22';
        ctx.save();
        ctx.beginPath();ctx.arc(this.wx,this.wy,wp,0,6.28);
        ctx.fillStyle=wc;ctx.fill();
        ctx.strokeStyle='rgba(70,20,20,.72)';ctx.lineWidth=2;
        ctx.beginPath();
        const cross=5;
        ctx.moveTo(this.wx-cross,this.wy-cross);ctx.lineTo(this.wx+cross,this.wy+cross);
        ctx.moveTo(this.wx+cross,this.wy-cross);ctx.lineTo(this.wx-cross,this.wy+cross);
        ctx.stroke();
        ctx.restore();
      }

      ctx.save();
      ctx.fillStyle='#fff';ctx.font='bold 34px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.lineWidth=4;ctx.strokeStyle='rgba(0,0,0,.75)';
      ctx.strokeText(mineralNumber(this.hp),this.x,this.y);
      ctx.fillText(mineralNumber(this.hp),this.x,this.y);
      ctx.restore();

      if(this.breakTime>0){
        const bt=this.breakTime/BREAK_TIME_FRAMES;
        const spread=bt*30;
        ctx.save();
        ctx.globalAlpha=.38+bt*.42;
        ctx.shadowColor='#ffec66';
        ctx.shadowBlur=18+bt*18;
        strokePoly(this.x,this.y,this.r+spread,this.sides,this.ang,'#ffec66',2+bt*1.5);
        ctx.restore();
      }

    } else {
      /* normal mineral */
      drawPoly(this.x,this.y,rr,this.sides,this.ang,this.col);
      if(hr<1){
        ctx.save();ctx.globalAlpha=(1-hr)*.5;
        drawPoly(this.x,this.y,rr,this.sides,this.ang,'#000');
        ctx.restore();
      }
      ctx.save();
      ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,.75)';
      ctx.strokeText(mineralNumber(this.hp),this.x,this.y);
      ctx.fillText(mineralNumber(this.hp),this.x,this.y);
      ctx.restore();
    }
  }
}

/* ───── Player ───── */
const plr={
  x:W/2, y:H-95,
  tx:W/2, ty:H-95,
  spd:3.8, r:16,
  pAng:0, pSpd:.09, pOrbit:33, pLen:14, pickCount:6,

  update(){
    let kx=(keys.d?1:0)-(keys.a?1:0);
    let ky=(keys.s?1:0)-(keys.w?1:0);
    const kd=Math.hypot(kx,ky);
    if(kd>0){
      this.moveBy(kx/kd*this.spd,ky/kd*this.spd);
      this.tx=this.x;this.ty=this.y;
    } else {
      const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.hypot(dx,dy);
      if(d>1.5) this.moveBy(dx/d*Math.min(d,this.spd),dy/d*Math.min(d,this.spd));
    }
    this.pAng+=this.pSpd;
  },

  moveBy(dx,dy){
    const nx=Math.max(this.r,Math.min(W-this.r,this.x+dx));
    if(!isBlockedByMineral(nx,this.y)) this.x=nx;
    const ny=Math.max(this.r,Math.min(H-this.r,this.y+dy));
    if(!isBlockedByMineral(this.x,ny)) this.y=ny;
  },

  tips(){
    const out=[];
    for(let i=0;i<this.pickCount;i++){
      const a=this.pAng+i/this.pickCount*6.28;
      out.push({
        x:this.x+Math.cos(a)*(this.pOrbit+this.pLen),
        y:this.y+Math.sin(a)*(this.pOrbit+this.pLen),
        a,
      });
    }
    return out;
  },

  drawPickaxe(a){
    const ax=this.x+Math.cos(a)*this.pOrbit;
    const ay=this.y+Math.sin(a)*this.pOrbit;
    ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(ax,ay);
    ctx.strokeStyle='rgba(120,120,120,.75)';ctx.lineWidth=2.5;ctx.stroke();

    ctx.save();
    ctx.translate(ax,ay);ctx.rotate(a+Math.PI/4);
    ctx.beginPath();
    ctx.moveTo(-9,2);ctx.lineTo(9,2);ctx.lineTo(13,-5);
    ctx.lineTo(7,-2);ctx.lineTo(1,-2);ctx.lineTo(1,-13);
    ctx.lineTo(-3,-9);ctx.lineTo(-3,-2);ctx.closePath();
    ctx.fillStyle='#ccc';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.moveTo(13,-5);ctx.lineTo(7,-2);
    ctx.strokeStyle='#ff8';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();

    const tx=this.x+Math.cos(a)*(this.pOrbit+this.pLen);
    const ty=this.y+Math.sin(a)*(this.pOrbit+this.pLen);
    ctx.beginPath();ctx.arc(tx,ty,3.5,0,6.28);
    ctx.fillStyle='rgba(255,220,80,.55)';ctx.fill();
  },

  draw(){
    /* target line */
    if(Math.hypot(this.tx-this.x,this.ty-this.y)>8){
      ctx.save();ctx.setLineDash([4,7]);
      ctx.strokeStyle='rgba(100,180,255,.15)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.tx,this.ty);ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(this.tx,this.ty,7,0,6.28);
      ctx.strokeStyle='rgba(100,180,255,.4)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.restore();
    }

    /* orbit ring */
    ctx.beginPath();ctx.arc(this.x,this.y,this.pOrbit,0,6.28);
    ctx.strokeStyle='rgba(100,180,255,.07)';ctx.lineWidth=1;ctx.stroke();

    for(let i=0;i<this.pickCount;i++) this.drawPickaxe(this.pAng+i/this.pickCount*6.28);

    /* body */
    ctx.save();ctx.shadowColor='#4af';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,6.28);
    ctx.fillStyle='#1e6aad';ctx.fill();ctx.strokeStyle='#8df';ctx.lineWidth=2.5;ctx.stroke();
    ctx.restore();
    ctx.beginPath();ctx.arc(this.x-4,this.y-4,5,0,6.28);
    ctx.fillStyle='rgba(255,255,255,.32)';ctx.fill();

    const stones=Math.min(6,Math.ceil(playerCargo/CARRY_MAX*6));
    for(let i=0;i<stones;i++){
      const ox=-15+i*6;
      const oy=18+(i%2)*3;
      ctx.beginPath();ctx.arc(this.x+ox,this.y+oy,4,0,6.28);
      ctx.fillStyle=i%2?'#7bdcff':'#f6b04a';
      ctx.fill();ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=1;ctx.stroke();
    }

    const cw=138,ch=21,cx=this.x-cw/2,cy=this.y+34;
    ctx.fillStyle='rgba(0,0,0,.72)';
    ctx.fillRect(cx,cy,cw,ch);
    ctx.fillStyle='#45df55';
    ctx.fillRect(cx,cy,cw*(playerCargo/CARRY_MAX),ch);
    ctx.strokeStyle='rgba(255,255,255,.32)';
    ctx.lineWidth=1;
    ctx.strokeRect(cx,cy,cw,ch);
    ctx.fillStyle='#fff';
    ctx.font='bold 13px Arial';
    ctx.textAlign='center';
    ctx.fillText('CARGO '+Math.floor(playerCargo)+'/'+CARRY_MAX,this.x,cy+15);
  }
};

/* ───── Base ───── */
const base={x:W/2,y:H-40,r:28,pulse:0,
  draw(){
    this.pulse+=.04;
    ctx.save();ctx.globalAlpha=.28+Math.sin(this.pulse)*.14;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r+8+Math.sin(this.pulse)*4,0,6.28);
    ctx.strokeStyle='#fa0';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,6.28);
    ctx.fillStyle='#2a1800';ctx.fill();ctx.strokeStyle='#fa0';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#fa0';ctx.font='bold 11px Arial';ctx.textAlign='center';
    ctx.fillText('BASE',this.x,this.y+4);
  }
};

/* ───── Game state ───── */
let minerals=[];
let state='playing'; // playing | cleared
let chapter=1, deliveredCargo=0, playerCargo=0, score=0;
const CARGO_MAX=100;
const CARRY_MAX=100;

function spawnMinerals(){
  minerals=[];
  const nCols=['#5f8','#f65','#57f','#ff5','#f5f','#5ff','#fa5','#5af'];
  const nSides=[3,4,5,6,7,8];
  const smallCount=4+Math.floor(chapter*.8);
  const midCount=3+Math.floor(chapter*.55);
  const normalScale=1.2+Math.min(.25,chapter*.015);
  const largeScale=1.2+Math.min(.75,(chapter-1)*.08);

  for(let i=0;i<smallCount;i++){
    const r=(13+Math.random()*5)*normalScale;
    const pos=findSpawnSpot(r,'normal',50,H-170);
    if(!pos) continue;
    minerals.push(new Mineral({
      x:pos.x,y:pos.y,type:'normal',tier:'small',
      r,
      sides:nSides[Math.floor(Math.random()*nSides.length)],
      col:nCols[Math.floor(Math.random()*nCols.length)],
      hp:(45+Math.random()*25+chapter*3)*20,
      val:6+Math.floor(Math.random()*4),
    }));
  }

  for(let i=0;i<midCount;i++){
    const r=(25+Math.random()*8)*normalScale;
    const pos=findSpawnSpot(r,'normal',50,H-185)||fallbackSpawnSpot(r,i,midCount,50,H-185);
    minerals.push(new Mineral({
      x:pos.x,y:pos.y,type:'normal',tier:'mid',
      r,
      sides:5+Math.floor(Math.random()*3),
      col:nCols[Math.floor(Math.random()*nCols.length)],
      hp:(105+Math.random()*50+chapter*8)*20,
      val:14+Math.floor(Math.random()*7),
    }));
  }

  const lCount=1+Math.floor(chapter/2);
  const lCols=['#f84','#84f','#4f8','#f44','#48f','#fa0'];
  const largeHpBase=240+chapter*28+Math.floor((largeScale-1)*180);
  for(let i=0;i<lCount;i++){
    const r=(42+Math.random()*10+i*2)*largeScale;
    const mainPos={x:W*.3+(Math.random()-.5)*60,y:H*.33+(Math.random()-.5)*70};
    const pos=i===0?mainPos:(findSpawnSpot(r,'large',62,H-215)||fallbackSpawnSpot(r,i,lCount,62,H-215));
    minerals.push(new Mineral({
      x:pos.x,y:pos.y,type:'large',tier:'large',
      r,
      sides:6,
      col:lCols[i%lCols.length],
      hp:largeHpBase*40,
      val:35+chapter*3,
    }));
  }

  const giantScale=largeScale+0.45+Math.min(.45,chapter*.04);
  const giantR=(58+Math.random()*12)*giantScale;
  const giantPos={
    x:W*.52+(Math.random()-.5)*70,
    y:H*.35+(Math.random()-.5)*60,
  };
  minerals.push(new Mineral({
    x:giantPos.x,y:giantPos.y,type:'large',tier:'giant',
    r:giantR,
    sides:8,
    col:'#8a4fff',
    hp:largeHpBase*60,
    val:55+chapter*5,
  }));
  relaxMineralLayout();
}

/* ───── Mining ───── */
function checkMining(){
  if(state!=='playing') return;
  const tips=plr.tips();

  for(const m of minerals){
    if(m.mined) continue;
    for(const t of tips){
      const d=Math.hypot(t.x-m.x,t.y-m.y);

      if(m.type==='large'){
        const wd=Math.hypot(t.x-m.wx,t.y-m.wy);
        const weakVisible=m.wReveal>=WEAK_APPEAR_FRAMES&&m.breakTime<=0;
        if(weakVisible&&wd<17){
          if(m.hit(true,t.x,t.y)) spawnOre(m.x,m.y,m.val,m.col,m.tier);
          break;
        }
        if(d<m.r+2){
          if(m.hit(false,t.x,t.y)) spawnOre(m.x,m.y,m.val,m.col,m.tier);
          break;
        }
      } else {
        if(d<m.r+6){
          if(m.hit()) spawnOre(m.x,m.y,m.val,m.col,m.tier);
          break;
        }
      }
    }
  }
}

/* ───── Background ───── */
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0b0f18');g.addColorStop(1,'#16102a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(65,65,105,.28)';
  for(let x=25;x<W;x+=50) for(let y=25;y<H;y+=50){
    ctx.beginPath();ctx.arc(x,y,1.5,0,6.28);ctx.fill();
  }
}

/* ───── HUD ───── */
function drawHUD(){
  /* chapter / score */
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(6,6,120,46);
  ctx.fillStyle='#adf';ctx.font='13px Arial';ctx.textAlign='left';
  ctx.fillText('챕터 '+chapter,12,23);
  ctx.fillStyle='#ff8';ctx.fillText('점수: '+score,12,43);

  /* remaining */
  const rem=minerals.filter(m=>!m.mined).length;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(W-132,6,126,28);
  ctx.fillStyle='#ddd';ctx.font='13px Arial';ctx.textAlign='right';
  ctx.fillText('광물 잔여: '+rem,W-8,25);

  /* player cargo */
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(W-132,40,126,28);
  ctx.fillStyle=playerCargo>=CARRY_MAX?'#ffb347':'#9fd';
  ctx.font='13px Arial';ctx.textAlign='right';
  ctx.fillText('내 카고: '+Math.floor(playerCargo)+' / '+CARRY_MAX,W-8,59);

  if(playerCargo>=CARRY_MAX){
    const bx=Math.min(W-230,Math.max(20,plr.x-88));
    const by=Math.max(18,plr.y-82);
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,.94)';
    ctx.strokeStyle='#ff9f1a';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.roundRect(bx,by,210,38,10);
    ctx.fill();ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(plr.x-10,by+38);ctx.lineTo(plr.x+10,by+38);ctx.lineTo(plr.x,by+50);
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='#251400';ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText('베이스로 가 카고를 비우세요!',bx+105,by+24);
    ctx.restore();
  }

  /* cleared overlay */
  if(state==='cleared'){
    ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff0';ctx.font='bold 56px Arial';ctx.textAlign='center';
    ctx.fillText('챕터 클리어!',W/2,H/2-25);
    ctx.fillStyle='#fff';ctx.font='22px Arial';
    ctx.fillText('점수: '+score,W/2,H/2+25);
    ctx.fillStyle='#adf';ctx.font='16px Arial';
    ctx.fillText('클릭하여 다음 챕터',W/2,H/2+65);
  }
}

/* ───── Input ───── */
const keys={w:false,a:false,s:false,d:false};
function inputKey(e){
  const byCode={KeyW:'w',KeyA:'a',KeyS:'s',KeyD:'d'};
  return byCode[e.code]||e.key.toLowerCase();
}
window.addEventListener('keydown',e=>{
  const k=inputKey(e);
  if(k in keys){
    keys[k]=true;
    e.preventDefault();
  }
});
window.addEventListener('keyup',e=>{
  const k=inputKey(e);
  if(k in keys){
    keys[k]=false;
    e.preventDefault();
  }
});
c.addEventListener('mousedown',e=>{
  if(state==='cleared'){nextChapter();return;}
  const r=c.getBoundingClientRect();
  plr.tx=e.clientX-r.left;plr.ty=e.clientY-r.top;
});
c.addEventListener('mousemove',e=>{
  if(e.buttons!==1||state!=='playing') return;
  const r=c.getBoundingClientRect();
  plr.tx=e.clientX-r.left;plr.ty=e.clientY-r.top;
});

function nextChapter(){
  chapter++;state='playing';deliveredCargo=0;playerCargo=0;
  ores.length=0;
  plr.x=W/2;plr.y=H-95;plr.tx=W/2;plr.ty=H-95;
  spawnMinerals();
}

/* ───── Loop ───── */
function loop(){
  tickShake();
  ctx.save();ctx.translate(sx,sy);
  drawBg();
  base.draw();
  for(const m of minerals){m.update();m.draw();}

  if(state!=='cleared'){
    plr.update();
    checkMining();
    tickOres();

    if(playerCargo>0&&Math.hypot(plr.x-base.x,plr.y-base.y)<base.r+plr.r){
      deliveredCargo=Math.min(CARGO_MAX,deliveredCargo+playerCargo);
      spawnPts(base.x,base.y,'#fa0',Math.min(18,4+Math.floor(playerCargo/3)));
      playerCargo=0;
    }

    if(state==='playing'&&minerals.length>0&&minerals.every(m=>m.mined)&&ores.length<=0&&playerCargo<=0){
      state='cleared';
    }
  }

  tickPts();drawOres();drawPts();
  plr.draw();
  ctx.restore();
  drawHUD();
  requestAnimationFrame(loop);
}

spawnMinerals();
loop();
</script>
